nodes:
  - id: pub
    build: cargo build --bin pub
    path: ./target/debug/pub
    inputs:
      tick: dora/timer/millis/500
    outputs:
      - temperature

  - id: sub
    build: cargo build --bin sub
    path: ./target/debug/sub
    inputs:
      temperature: pub/temperature

